services:
  postgres_local:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:"5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petshop_network

  backend:
    # extra_hosts:
    #  - "host.docker.internal:host-gateway"  # Minha rede docker interna vai rodar utilizando a rede da minha máquina / host
    # dns:
    #  - 8.8.8.8 google
    #  - 1.1.1.1 cloudflare
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: petshop_backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_local:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DEBUG: "true"
      LOG_LEVEL: "debug"
    ports:
      - ${BACKEND_PORT}:8000
    depends_on:
      POSTGRES_LOCAL:
        condition: service_healthy
      REDIS:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT} -a-log-level debug
    restart: unvicon-stopped
    networks:
      - petshop_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: petshop_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - petshop_network

volumes:
  pgdata:
